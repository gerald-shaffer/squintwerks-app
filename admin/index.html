<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X-WEB — Create Experience</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>
  <style>
    :root {
      --black: #000; --surface: #111; --surface-2: #1A1A1A;
      --border: #2A2A2A; --gold: #C9A84C; --gold-dim: rgba(201,168,76,0.4);
      --gold-bg: rgba(201,168,76,0.08); --white: #F5F5F5; --muted: #999;
      --green: #22C55E; --red: #EF4444;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:var(--black); color:var(--white); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:40px 20px; }
    
    .brand { text-align:center; margin-bottom:40px; }
    .brand h1 { font-family:'Oswald',sans-serif; font-size:36px; color:var(--gold); letter-spacing:0.15em; }
    .brand p { font-size:12px; color:var(--muted); letter-spacing:0.2em; margin-top:4px; }

    .panel { width:100%; max-width:600px; }

    /* Create Form */
    .create-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:32px; margin-bottom:24px; }
    .create-card h2 { font-family:'Oswald',sans-serif; font-size:20px; color:var(--gold); margin-bottom:24px; letter-spacing:0.05em; }
    
    .field { margin-bottom:20px; }
    .field label { display:block; font-size:11px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
    .field input[type="text"] { width:100%; padding:12px 14px; background:var(--black); border:1px solid var(--border); color:var(--white); font-size:14px; border-radius:4px; outline:none; transition:border-color 0.2s; }
    .field input[type="text"]:focus { border-color:var(--gold); }
    .field-hint { font-size:11px; color:#666; margin-top:4px; }

    .upload-zone { border:2px dashed var(--border); border-radius:6px; padding:24px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
    .upload-zone:hover { border-color:var(--gold-dim); background:var(--gold-bg); }
    .upload-zone.has-file { border-color:var(--green); border-style:solid; }
    .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
    .upload-zone .icon { font-size:24px; margin-bottom:8px; color:var(--muted); }
    .upload-zone .label { font-size:13px; color:var(--muted); }
    .upload-zone .filename { font-size:12px; color:var(--green); margin-top:6px; font-weight:500; }

    .btn-create { width:100%; padding:16px; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Oswald',sans-serif; font-size:16px; letter-spacing:0.2em; cursor:pointer; border-radius:4px; transition:all 0.2s; }
    .btn-create:hover { background:var(--gold); color:var(--black); }
    .btn-create:disabled { opacity:0.3; cursor:not-allowed; }
    .btn-create:disabled:hover { background:transparent; color:var(--gold); }

    /* Progress */
    .progress { display:none; margin-top:16px; }
    .progress.active { display:block; }
    .progress-bar { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--gold); width:0%; transition:width 0.3s; }
    .progress-text { font-size:11px; color:var(--muted); margin-top:8px; text-align:center; }

    /* Result */
    .result-card { display:none; background:var(--surface); border:1px solid var(--green); border-radius:8px; padding:32px; text-align:center; }
    .result-card.active { display:block; }
    .result-card h2 { font-family:'Oswald',sans-serif; font-size:20px; color:var(--green); margin-bottom:16px; }
    .result-url { display:block; font-size:16px; color:var(--gold); text-decoration:none; margin-bottom:24px; word-break:break-all; }
    .result-url:hover { text-decoration:underline; }
    .qr-container { display:inline-block; background:white; padding:16px; border-radius:8px; margin-bottom:16px; }
    .qr-container canvas { display:block; }
    .result-instructions { font-size:12px; color:var(--muted); margin-top:16px; line-height:1.6; }
    .btn-new { margin-top:24px; padding:12px 24px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.15em; cursor:pointer; border-radius:4px; }
    .btn-new:hover { border-color:var(--gold); color:var(--gold); }

    /* Existing experiences */
    .existing { margin-top:40px; width:100%; max-width:600px; }
    .existing h3 { font-family:'Oswald',sans-serif; font-size:16px; color:var(--muted); margin-bottom:16px; letter-spacing:0.1em; }
    .exp-item { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:6px; margin-bottom:8px; }
    .exp-item .name { font-size:14px; font-weight:500; }
    .exp-item .url { font-size:12px; color:var(--gold); text-decoration:none; }
    .exp-item .url:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="brand">
    <h1>X-WEB</h1>
    <p>CREATE AR EXPERIENCE</p>
  </div>

  <div class="panel">
    <!-- Create Form -->
    <div class="create-card" id="create-card">
      <h2>NEW EXPERIENCE</h2>
      
      <div class="field">
        <label>Experience Name</label>
        <input type="text" id="exp-name" placeholder="e.g., Sunshine Coast Golf Hole 1">
      </div>

      <div class="field">
        <label>Trigger Image (what people point their phone at)</label>
        <div class="upload-zone" id="zone-image">
          <div class="icon">&#x1F4F7;</div>
          <div class="label">Drop image here or click to upload</div>
          <div class="filename" id="filename-image"></div>
          <input type="file" accept="image/*" id="input-image" onchange="handleFile(this,'image')">
        </div>
      </div>

      <div class="field">
        <label>Video (plays when image is detected)</label>
        <div class="upload-zone" id="zone-video">
          <div class="icon">&#x1F3AC;</div>
          <div class="label">Drop MP4 here or click to upload</div>
          <div class="filename" id="filename-video"></div>
          <input type="file" accept="video/mp4,video/webm,video/*" id="input-video" onchange="handleFile(this,'video')">
        </div>
      </div>

      <button class="btn-create" id="btn-create" onclick="createExperience()" disabled>CREATE EXPERIENCE</button>

      <div class="progress" id="progress">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-text" id="progress-text">Uploading...</div>
      </div>
    </div>

    <!-- Result -->
    <div class="result-card" id="result-card">
      <h2>EXPERIENCE READY</h2>
      <a class="result-url" id="result-url" href="#" target="_blank"></a>
      <div class="qr-container" id="qr-container"></div>
      <p class="result-instructions">
        Point your phone camera at the trigger image.<br>
        Share this QR code with your client.
      </p>
      <button class="btn-new" onclick="resetForm()">+ CREATE ANOTHER</button>
    </div>
  </div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBYhf2q_bsS1pcUvLZNoiLBSvWCKB6VWog",
      authDomain: "x-web-ar-platform.firebaseapp.com",
      projectId: "x-web-ar-platform",
      storageBucket: "x-web-ar-platform.firebasestorage.app",
      messagingSenderId: "795991549233",
      appId: "1:795991549233:web:741ac6e74bac19266f3c10"
    };
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    // State
    let imageFile = null;
    let videoFile = null;

    function handleFile(input, type) {
      const file = input.files[0];
      if (!file) return;

      if (type === 'image') {
        imageFile = file;
        document.getElementById('filename-image').textContent = file.name;
        document.getElementById('zone-image').classList.add('has-file');
      } else {
        videoFile = file;
        document.getElementById('filename-video').textContent = file.name;
        document.getElementById('zone-video').classList.add('has-file');
      }

      // Enable button when both files are uploaded
      document.getElementById('btn-create').disabled = !(imageFile && videoFile);
    }

    async function createExperience() {
      const name = document.getElementById('exp-name').value || 'untitled';
      const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '') || 'experience-' + Date.now();

      const btn = document.getElementById('btn-create');
      const progress = document.getElementById('progress');
      const progressFill = document.getElementById('progress-fill');
      const progressText = document.getElementById('progress-text');

      btn.disabled = true;
      progress.classList.add('active');
      progressText.textContent = 'Uploading trigger image...';
      progressFill.style.width = '10%';

      try {
        // 1. Upload image to Firebase Storage
        const imageRef = storage.ref(`experiences/${slug}/trigger${getExt(imageFile.name)}`);
        await imageRef.put(imageFile);
        const imageUrl = await imageRef.getDownloadURL();
        progressFill.style.width = '30%';
        progressText.textContent = 'Uploading video...';

        // 2. Upload video to Firebase Storage
        const videoRef = storage.ref(`experiences/${slug}/content${getExt(videoFile.name)}`);
        const uploadTask = videoRef.put(videoFile);
        
        await new Promise((resolve, reject) => {
          uploadTask.on('state_changed',
            (snapshot) => {
              const pct = 30 + (snapshot.bytesTransferred / snapshot.totalBytes) * 50;
              progressFill.style.width = pct + '%';
            },
            reject,
            resolve
          );
        });
        const videoUrl = await videoRef.getDownloadURL();
        progressFill.style.width = '85%';
        progressText.textContent = 'Building AR experience...';

        // 3. Generate the AR experience HTML and upload it
        const arHtml = buildArExperience(name, imageUrl, videoUrl);
        const htmlRef = storage.ref(`experiences/${slug}/index.html`);
        await htmlRef.putString(arHtml, 'raw', { contentType: 'text/html' });
        const experienceUrl = await htmlRef.getDownloadURL();

        progressFill.style.width = '100%';
        progressText.textContent = 'Done!';

        // 4. Show result
        setTimeout(() => {
          showResult(experienceUrl, name);
        }, 500);

      } catch (err) {
        console.error(err);
        progressText.textContent = 'Error: ' + err.message;
        progressFill.style.width = '0%';
        btn.disabled = false;
      }
    }

    function buildArExperience(name, imageUrl, videoUrl) {
      return `<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>${name} — X-WEB AR</title>
  <style>
    * { margin:0; padding:0; }
    body { background:#000; overflow:hidden; font-family:sans-serif; }
    #loading { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; z-index:1000; color:#C9A84C; }
    #loading h1 { font-size:24px; letter-spacing:0.15em; margin-bottom:8px; }
    #loading p { font-size:12px; color:#999; }
    .hidden { display:none !important; }
    #overlay-video { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); max-width:90vw; max-height:80vh; z-index:500; border:2px solid #C9A84C; border-radius:4px; }
    #scan-hint { position:fixed; bottom:40px; left:50%; transform:translateX(-50%); color:#C9A84C; font-size:13px; letter-spacing:0.1em; z-index:100; text-align:center; }
    #camera-feed { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; }
  </style>
</head>
<body>
  <div id="loading">
    <h1>X-WEB</h1>
    <p>Initializing camera...</p>
  </div>
  <video id="camera-feed" autoplay playsinline muted></video>
  <video id="overlay-video" class="hidden" playsinline></video>
  <div id="scan-hint">POINT CAMERA AT IMAGE</div>

  <script>
    // Simple AR experience - camera + video overlay
    // In production this uses 8th Wall image target detection
    // For now: tap screen to play video (demo mode)
    
    const loading = document.getElementById('loading');
    const cameraFeed = document.getElementById('camera-feed');
    const overlayVideo = document.getElementById('overlay-video');
    const scanHint = document.getElementById('scan-hint');

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' }, audio: false 
        });
        cameraFeed.srcObject = stream;
        loading.classList.add('hidden');
      } catch(e) {
        loading.querySelector('p').textContent = 'Camera access required. Please allow camera.';
      }
    }

    // Tap to trigger video (demo - in production this is image-target triggered)
    document.body.addEventListener('click', () => {
      if (!overlayVideo.classList.contains('hidden')) {
        overlayVideo.pause();
        overlayVideo.classList.add('hidden');
        scanHint.textContent = 'POINT CAMERA AT IMAGE';
        return;
      }
      overlayVideo.src = '${videoUrl}';
      overlayVideo.classList.remove('hidden');
      overlayVideo.play();
      scanHint.textContent = 'TAP TO DISMISS';
    });

    startCamera();
  <\/script>
</body>
</html>`;
    }

    function showResult(url, name) {
      document.getElementById('create-card').style.display = 'none';
      const resultCard = document.getElementById('result-card');
      resultCard.classList.add('active');

      const resultUrl = document.getElementById('result-url');
      resultUrl.href = url;
      resultUrl.textContent = url.split('?')[0].replace('https://firebasestorage.googleapis.com/v0/b/x-web-ar-platform.firebasestorage.app/o/', '').split('%2F').pop();

      // Generate QR code
      const qrContainer = document.getElementById('qr-container');
      qrContainer.innerHTML = '';
      QRCode.toCanvas(url, { width: 200, margin: 1, color: { dark: '#000', light: '#fff' } }, (err, canvas) => {
        if (!err) qrContainer.appendChild(canvas);
      });
    }

    function resetForm() {
      imageFile = null;
      videoFile = null;
      document.getElementById('create-card').style.display = 'block';
      document.getElementById('result-card').classList.remove('active');
      document.getElementById('filename-image').textContent = '';
      document.getElementById('filename-video').textContent = '';
      document.getElementById('zone-image').classList.remove('has-file');
      document.getElementById('zone-video').classList.remove('has-file');
      document.getElementById('btn-create').disabled = true;
      document.getElementById('progress').classList.remove('active');
      document.getElementById('exp-name').value = '';
    }

    function getExt(filename) {
      const idx = filename.lastIndexOf('.');
      return idx >= 0 ? filename.substring(idx) : '';
    }
  </script>
</body>
</html>
