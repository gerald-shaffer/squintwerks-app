<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>X-WEB Experience</title>

  <!-- X-WEB Design System -->
  <link rel="stylesheet" href="styles/xweb-theme.css">
  <link rel="stylesheet" href="styles/app.css">

  <!-- A-Frame + 8th Wall Engine (CDN, free, no account) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe-master.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- ============================================================
       X-WEB IMAGE TARGET TEMPLATE
       
       CONFIGURATION:
       Edit config.js to set:
       - App name, channel name, branding
       - Image target data (generated JSON)
       - Video/audio URLs for each target
       ============================================================ -->

  <!-- Launch Screen -->
  <div id="launch-screen" class="screen active">
    <header class="xweb-header">
      <div class="brand">
        <span class="xweb-display xweb-gold" style="font-size:12px; letter-spacing:0.2em;">X-WEB</span>
        <span class="xweb-gold-dim" style="font-size:10px;">.IO</span>
      </div>
      <div class="status">
        <span class="xweb-status-dot online"></span>
        <span style="font-family:var(--font-display); font-size:9px; color:var(--xweb-muted); letter-spacing:0.1em; text-transform:uppercase; margin-left:6px;">Network Online</span>
      </div>
    </header>

    <main class="launch-content">
      <div class="divider"></div>
      <h1 id="app-title" class="xweb-display">APP NAME</h1>
      <p id="channel-name" class="xweb-display xweb-gold" style="font-size:14px; letter-spacing:0.3em; margin-top:8px;">CHANNEL NAME</p>
      <div class="divider"></div>

      <p class="instructions">Point your camera at the target image to begin the experience.</p>

      <button id="launch-btn" class="xweb-btn" onclick="launchCamera()">OPEN CAMERA</button>

      <div class="exhibit-count">
        <span id="target-count">0 TARGETS LOADED</span>
      </div>
    </main>

    <footer class="xweb-footer" style="position:absolute;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-family:var(--font-display); font-size:9px; color:var(--xweb-muted-dim); letter-spacing:0.1em; text-transform:uppercase;">Powered by X-WEB.IO</span>
        <span style="font-family:var(--font-display); font-size:9px; color:var(--xweb-muted-dim); letter-spacing:0.1em; text-transform:uppercase;">Shaffer Media Group</span>
      </div>
    </footer>
  </div>

  <!-- Camera / AR Screen -->
  <div id="camera-screen" class="screen">
    <!-- A-Frame scene injected here by app.js -->
    <div id="ar-container"></div>

    <!-- UI Overlay -->
    <div class="ar-overlay">
      <header class="xweb-header">
        <button class="back-btn" onclick="exitCamera()">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
          <span>EXIT</span>
        </button>
        <span class="xweb-display xweb-gold" style="font-size:10px; letter-spacing:0.15em;">X-WEB</span>
        <div class="status" id="ar-status">
          <span class="xweb-status-dot scanning"></span>
          <span style="font-family:var(--font-display); font-size:9px; color:var(--xweb-gold-dim); letter-spacing:0.1em; text-transform:uppercase; margin-left:6px;">Scanning</span>
        </div>
      </header>

      <!-- Viewfinder corners (visible while scanning) -->
      <div id="viewfinder" class="viewfinder-active">
        <div class="xweb-viewfinder-corner top-left"></div>
        <div class="xweb-viewfinder-corner top-right"></div>
        <div class="xweb-viewfinder-corner bottom-left"></div>
        <div class="xweb-viewfinder-corner bottom-right"></div>
      </div>

      <!-- Tap to play overlay (shown when target detected) -->
      <div id="tap-to-play" class="tap-overlay hidden">
        <button class="xweb-btn" onclick="playContent()">TAP TO PLAY</button>
      </div>

      <!-- Bottom info bar -->
      <div class="xweb-footer">
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
          <div>
            <p style="font-family:var(--font-display); font-size:10px; color:var(--xweb-gold-dim); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:2px;">Channel</p>
            <p id="footer-channel" style="font-family:var(--font-display); font-size:12px; color:var(--xweb-white); letter-spacing:0.1em; text-transform:uppercase;">CHANNEL NAME</p>
          </div>
          <div>
            <p id="footer-target" style="font-family:var(--font-display); font-size:9px; color:var(--xweb-muted-dim); letter-spacing:0.1em;">Target #1</p>
          </div>
        </div>
        <div id="scan-hint" style="text-align:center; margin-top:8px;">
          <p style="font-family:var(--font-body); font-size:11px; color:var(--xweb-muted-dim);">Point camera at target image</p>
        </div>
      </div>
    </div>
  </div>

  <!-- App configuration and logic -->
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
